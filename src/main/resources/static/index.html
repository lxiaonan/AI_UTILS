<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Platform Backend</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.18), transparent 28%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: #e2e8f0;
    }

    main {
      width: min(720px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.78);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.15;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.7;
      color: #cbd5e1;
    }

    code {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.95);
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <main>
    <h1>Backend is running</h1>
    <p>This service now provides APIs only.</p>
    <p>Run the frontend separately from <code>frontend/</code> with <code>npm run dev</code> for local development, or deploy the built <code>frontend/dist</code> as a standalone static site.</p>
    <p>API base path: <code>/api</code></p>
    <p>Uploaded assets remain available from <code>/uploads/**</code>.</p>
  </main>
</body>
</html>
