<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 图像生成工作台</title>
    <link rel="icon" type="image/png" href="/logo/ai%E5%9B%BE%E6%A0%87.png">
    <link rel="apple-touch-icon" href="/logo/ai%E5%9B%BE%E6%A0%87.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at 50% 20%, #1e1b4b 0%, #05060a 55%, #000 100%); color: #e2e8f0; min-height: 100vh; }
        .glass-nav { background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(148, 163, 184, 0.12); }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); transition: all 0.3s ease; }
        .glass-panel:hover { border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4); }
        
        .neon-border { transition: all 0.3s ease; }
        .neon-border:focus-within {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            border-color: #6366f1;
            transform: scale(1.01);
        }
        .btn-glow { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.6); transform: translateY(-2px) scale(1.02); }
        .btn-glow:active { transform: translateY(1px) scale(0.98); }
        .neon-text {
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.8);
        }
        .gradient-text {
            background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="font-sans flex flex-col">

<nav class="glass-nav sticky top-0 z-50 mb-6">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex h-16 items-center justify-between">
            <div class="flex items-center gap-6 h-full">
                <a href="/" class="flex items-center" title="AI Platform">
                    <img src="/logo/ai%E5%9B%BE%E6%A0%87.png" class="w-9 h-9 rounded-2xl shadow-[0_0_24px_rgba(99,102,241,0.55)] ring-1 ring-indigo-400/30" alt="AI">
                </a>
                <a href="/" class="text-slate-400 hover:text-indigo-400 font-medium transition">SQL 优化</a>
                <a href="/history.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">优化历史</a>
                <a href="/image.html" class="text-indigo-400 font-bold border-b-2 border-indigo-500 h-full flex items-center transition">图像生成</a>
                <a href="/3d-camera.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">3D 镜头控图</a>
                <a href="/voice.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">语音生成</a>
            </div>

            <div id="userArea" class="flex items-center gap-3 text-sm">
                <a id="loginLink" href="/login.html" class="hidden text-slate-400 hover:text-indigo-400 font-medium transition">登录</a>
                <a id="registerLink" href="/register.html" class="hidden text-slate-400 hover:text-indigo-400 font-medium transition">注册</a>
                <div id="userInfo" class="hidden items-center gap-3">
                    <div class="text-slate-300">
                        <span class="font-bold text-slate-200" id="navUsername"></span>
                        <span class="text-slate-500 ml-2">AI 次数</span>
                        <span class="font-bold text-indigo-400" id="navUseCount"></span>
                    </div>
                    <button id="logoutBtn" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition border border-slate-700">退出</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 pb-10 flex-grow w-full">
    <div class="mb-10 text-center">
        <h2 class="text-5xl font-extrabold mb-4 gradient-text">视觉艺术创造中心</h2>
        <p class="text-slate-400 text-lg">基于 Qwen-Image-2.0，支持文本生成与多模态图生图</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <!-- 左侧：生成控制台 -->
        <div class="lg:col-span-8 space-y-6">
            <div class="glass-panel rounded-3xl p-6 relative overflow-hidden group">
                <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-3xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                <div class="relative bg-slate-900 rounded-2xl p-6">
                    <div class="flex justify-between items-center mb-4">
                        <label class="text-lg font-bold text-slate-200">✨ 灵感描述 (Prompt)</label>
                        <select id="modelSelect" class="bg-slate-800 border border-slate-700 text-slate-300 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2">
                            <option value="qwen-image-2.0">Qwen Image 2.0 (默认)</option>
                            <option value="qwen-image-2.0-pro">Qwen Image 2.0 Pro</option>
                            <option value="qwen-image-max">Qwen Image Max</option>
                        </select>
                    </div>

                    <textarea id="promptInput" rows="4" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-slate-200 focus:outline-none neon-border transition-all placeholder-slate-500" placeholder="描述你想要生成的画面，例如：一只赛博朋克风格的机器猫，霓虹灯背景，8k分辨率，高细节..."></textarea>
                    
                    <!-- 图生图扩展区 -->
                    <div class="mt-4 border-t border-slate-700 pt-4">
                        <label class="text-sm font-bold text-slate-400 mb-2 block">🖼️ 附加参考图 (最多支持3张，用于图生图多模态生成)</label>
                        <div class="flex items-center space-x-4">
                            <input type="file" id="imageUpload" accept="image/*" multiple class="block w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-900 file:text-indigo-300 hover:file:bg-indigo-800 transition-all"/>
                            <button id="clearImageBtn" class="hidden text-red-400 hover:text-red-300 text-sm px-3 py-2 bg-red-900/30 rounded-lg whitespace-nowrap">清除全部</button>
                        </div>
                        <div id="uploadStatus" class="mt-2 text-xs text-indigo-300 hidden">正在上传...</div>
                        
                        <!-- 预览与 URL 存储容器 -->
                        <div id="imagePreviewContainer" class="mt-4 hidden flex space-x-4 overflow-x-auto pb-2">
                            <!-- 动态插入预览图 -->
                        </div>
                    </div>

                    <button id="generateBtn" class="mt-6 w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-[0_0_20px_rgba(99,102,241,0.4)] btn-glow flex justify-center items-center text-lg">
                        🚀 立即生成
                    </button>
                </div>
            </div>

            <!-- 结果展示区 -->
            <div id="resultArea" class="glass-panel rounded-3xl p-6 min-h-[400px] flex flex-col items-center justify-center border border-slate-700">
                <svg class="w-20 h-20 text-slate-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p class="text-slate-500">艺术作品将在此处展现</p>
            </div>
        </div>

        <!-- 右侧：历史记录流 -->
        <div class="lg:col-span-4 glass-panel rounded-3xl p-6 flex flex-col h-[800px] border border-slate-700">
            <h3 class="text-xl font-bold text-slate-200 mb-4 flex items-center border-b border-slate-700 pb-4">
                <span class="bg-indigo-900 text-indigo-300 p-2 rounded-lg mr-2">🕒</span> 创作画廊
            </h3>
            
            <div id="historyList" class="flex-grow overflow-y-auto pr-2 space-y-4 custom-scrollbar">
                <div class="text-center text-slate-500 mt-10">
                    <svg class="animate-spin h-8 w-8 mx-auto mb-2 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    正在加载画廊...
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* 自定义滚动条 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6366f1; }
</style>

<script>
    // 图片上传 (支持多图)
    let uploadedImageBase64s = []; // 存储Base64用于发给大模型
    let uploadedImageUrls = []; // 存储本地URL仅用于页面展示记录（可选）

    document.getElementById('imageUpload').addEventListener('change', async function(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        if (files.length > 3) {
            alert('最多只能上传 3 张参考图哦！');
            e.target.value = '';
            return;
        }
        
        const previewContainer = document.getElementById('imagePreviewContainer');
        previewContainer.innerHTML = ''; // 清空之前预览
        uploadedImageBase64s = []; // 重置
        uploadedImageUrls = [];
        
        document.getElementById('uploadStatus').classList.remove('hidden');
        document.getElementById('uploadStatus').innerHTML = '<span class="text-indigo-300">正在解析并上传...</span>';
        previewContainer.classList.remove('hidden');
        document.getElementById('clearImageBtn').classList.remove('hidden');

        let uploadCount = 0;
        let hasError = false;

        for (let file of files) {
            // 本地预览
            const reader = new FileReader();
            reader.onload = function(event) {
                const imgWrap = document.createElement('div');
                imgWrap.className = 'relative inline-block flex-shrink-0';
                imgWrap.innerHTML = `<img src="${event.target.result}" class="h-32 w-auto object-cover rounded-lg border border-slate-600 shadow-lg opacity-50" id="preview-${file.name}">`;
                previewContainer.appendChild(imgWrap);
            };
            reader.readAsDataURL(file);
            
            // 自动上传到后端静态目录并获取 Base64
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch('/api/upload/image', {
                    method: 'POST',
                    body: formData
                });
                if (res.status === 401) {
                    sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                    window.location.href = '/login.html';
                    return;
                }
                const data = await res.json();
                if (data.success) {
                    uploadedImageUrls.push(data.url);
                    // 核心修改：保存 Base64 编码，用于提交给大模型，避免 localhost 无法访问的问题
                    uploadedImageBase64s.push(data.base64);
                    uploadCount++;
                    // 恢复图片透明度表示处理成功
                    setTimeout(() => {
                        const imgEl = document.getElementById(`preview-${file.name}`);
                        if(imgEl) imgEl.classList.remove('opacity-50');
                    }, 500);
                } else {
                    hasError = true;
                    alert(`图片 ${file.name} 处理失败: ` + data.message);
                }
            } catch (err) {
                hasError = true;
                alert(`图片 ${file.name} 处理失败: ` + err.message);
            }
        }

        if (!hasError) {
            document.getElementById('uploadStatus').innerHTML = `<span class="text-green-400">✅ 成功准备 ${uploadCount} 张参考图</span>`;
        } else {
            document.getElementById('uploadStatus').innerHTML = `<span class="text-red-400">⚠️ 部分或全部图片处理失败</span>`;
        }
        setTimeout(() => document.getElementById('uploadStatus').classList.add('hidden'), 3000);
    });

    document.getElementById('clearImageBtn').addEventListener('click', function() {
        document.getElementById('imageUpload').value = '';
        uploadedImageBase64s = [];
        uploadedImageUrls = [];
        document.getElementById('imagePreviewContainer').innerHTML = '';
        document.getElementById('imagePreviewContainer').classList.add('hidden');
        document.getElementById('clearImageBtn').classList.add('hidden');
        document.getElementById('uploadStatus').classList.add('hidden');
    });

    // 下载图片
    async function downloadImage(url, event) {
        if (event) event.stopPropagation();
        try {
            const response = await fetch(url, {
                // 对于云端图片，可能需要使用 no-cors 模式，但这可能会导致无法读取 blob
                // 因此如果同源或者允许跨域则可以正常下载，否则捕获异常进行降级处理
                mode: 'cors'
            });
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = `ai_image_${new Date().getTime()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
        } catch (error) {
            console.error('下载失败，尝试新窗口打开', error);
            // 降级：如果因为跨域无法转为 blob，则尝试创建一个隐藏的 a 标签触发下载
            const a = document.createElement('a');
            a.href = url;
            a.download = `ai_image_${new Date().getTime()}.png`;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    }

    // 轮询任务状态
    async function pollTaskStatus(taskId) {
        const resultArea = document.getElementById('resultArea');
        try {
            const res = await fetch(`/api/image/task/${taskId}`);
            const data = await res.json();
            const status = data.output.task_status;
            
            if (status === 'SUCCEEDED') {
                const results = data.output.results;
                if (results && results.length > 0) {
                    resultArea.innerHTML = results.map(r => `
                        <div class="w-full h-full flex flex-col items-center justify-center p-4">
                            <img src="${r.url}" class="rounded-xl shadow-[0_0_30px_rgba(99,102,241,0.3)] max-w-full max-h-[600px] object-contain border-2 border-indigo-500/30 hover:scale-105 transition-transform duration-500 cursor-pointer" onclick="window.open('${r.url}', '_blank')" title="点击查看大图">
                            <div class="flex space-x-6 mt-6">
                                <button onclick="window.open('${r.url}', '_blank')" class="text-indigo-400 hover:text-indigo-300 flex items-center bg-indigo-900/30 px-4 py-2 rounded-lg transition-colors"><svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>查看大图</button>
                                <button onclick="downloadImage('${r.url}', event)" class="text-indigo-400 hover:text-indigo-300 flex items-center bg-indigo-900/30 px-4 py-2 rounded-lg transition-colors"><svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>下载图片</button>
                            </div>
                        </div>
                    `).join('');
                    loadHistory(); // 刷新侧边栏画廊
                }
            } else if (status === 'FAILED') {
                resultArea.innerHTML = `<div class="text-red-400 bg-red-900/30 p-4 rounded-xl border border-red-800 w-full text-center">任务生成失败：${data.output.message || '未知错误'}</div>`;
            } else {
                // PENDING 或 RUNNING 继续轮询
                resultArea.innerHTML = `
                    <div class="text-center">
                        <div class="relative w-24 h-24 mx-auto mb-6">
                            <div class="absolute inset-0 rounded-full border-t-4 border-indigo-500 animate-spin"></div>
                            <div class="absolute inset-2 rounded-full border-r-4 border-purple-500 animate-[spin_1.5s_linear_infinite_reverse]"></div>
                            <div class="absolute inset-4 rounded-full border-b-4 border-pink-500 animate-spin"></div>
                        </div>
                        <p class="text-indigo-400 font-bold text-xl neon-text mb-2">AI 正在作画中...</p>
                        <p class="text-slate-500 text-sm">Task ID: ${taskId}</p>
                        <p class="text-slate-600 text-xs mt-2">预计需要 10-30 秒，请耐心等待</p>
                    </div>`;
                setTimeout(() => pollTaskStatus(taskId), 3000);
            }
        } catch (e) {
            console.error("轮询错误", e);
        }
    }

    // 生成操作
    document.getElementById('generateBtn').addEventListener('click', async () => {
        const prompt = document.getElementById('promptInput').value.trim();
        const model = document.getElementById('modelSelect').value;
        
        if (!prompt && uploadedImageBase64s.length === 0) return alert('请输入提示词或至少上传一张参考图！');
        
        const btn = document.getElementById('generateBtn');
        const resultArea = document.getElementById('resultArea');
        
        btn.disabled = true;
        btn.classList.add('opacity-50', 'cursor-not-allowed');
        resultArea.innerHTML = `
            <div class="text-center">
                <svg class="animate-spin h-12 w-12 mx-auto mb-4 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="text-indigo-400 font-bold">正在提交任务并传输图片数据，请耐心等待...</p>
            </div>`;

        const contentArray = uploadedImageBase64s.map(base64 => ({ image: base64 }));
        if (prompt) contentArray.push({ text: prompt });

        let requestBody = {
            model: model,
            input: {
                messages: [
                    { role: "user", content: contentArray }
                ]
            },
            parameters: {
                n: 1,
                negative_prompt: "",
                watermark: false,
                prompt_extend: true
            }
        };

        let queryParams = "";
        if (uploadedImageUrls.length > 0) {
            queryParams = "?localUrls=" + encodeURIComponent(uploadedImageUrls.join(','));
        }

        try {
            const res = await fetch('/api/image/generate' + queryParams, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            if (res.status === 401) {
                sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                window.location.href = '/login.html';
                return;
            }
            const data = await res.json();
            
            // 同步模式：尝试解析多种图片返回结构
            let imageUrls = [];
            
            // 格式1: data.output.results[i].url
            if (data.output && data.output.results) {
                imageUrls = data.output.results.map(r => r.url).filter(Boolean);
            } 
            // 格式2: data.output.choices[0].message.content[i].image (兼容格式)
            else if (data.output && data.output.choices && data.output.choices[0].message && data.output.choices[0].message.content) {
                const contents = data.output.choices[0].message.content;
                if (Array.isArray(contents)) {
                    imageUrls = contents.map(c => c.image).filter(Boolean);
                }
            }

            if (imageUrls.length > 0) {
                resultArea.innerHTML = imageUrls.map(url => `
                    <div class="w-full h-full flex flex-col items-center justify-center p-4">
                        <img src="${url}" class="rounded-xl shadow-[0_0_30px_rgba(99,102,241,0.3)] max-w-full max-h-[600px] object-contain border-2 border-indigo-500/30 hover:scale-105 transition-transform duration-500 cursor-pointer" onclick="window.open('${url}', '_blank')" title="点击查看大图">
                        <div class="flex space-x-6 mt-6">
                            <button onclick="window.open('${url}', '_blank')" class="text-indigo-400 hover:text-indigo-300 flex items-center bg-indigo-900/30 px-4 py-2 rounded-lg transition-colors"><svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>查看大图</button>
                            <button onclick="downloadImage('${url}', event)" class="text-indigo-400 hover:text-indigo-300 flex items-center bg-indigo-900/30 px-4 py-2 rounded-lg transition-colors"><svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>下载图片</button>
                        </div>
                    </div>
                `).join('');
                loadHistory(); // 刷新侧边栏画廊
            } else if (data.code && data.message) {
                // 处理 API 报错情况
                resultArea.innerHTML = `<div class="text-red-400 bg-red-900/30 p-4 rounded-xl border border-red-800 w-full text-left">
                    <strong>任务生成失败：</strong><br/>
                    Code: ${data.code}<br/>
                    Message: ${data.message}
                </div>`;
            } else {
                // 生成成功但没解析出图片链接
                resultArea.innerHTML = `<div class="text-yellow-400 bg-yellow-900/30 p-4 rounded-xl border border-yellow-800 w-full text-left overflow-auto">
                    <strong>API调用成功，但未解析到图片链接。原始响应：</strong><br/>
                    <pre class="text-xs mt-2">${JSON.stringify(data, null, 2)}</pre>
                </div>`;
            }
        } catch (err) {
            resultArea.innerHTML = `<div class="text-red-400 bg-slate-800 p-4 rounded-xl w-full">请求失败: ${err.message}</div>`;
        } finally {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    });

    // 加载历史画廊
    async function loadHistory() {
        try {
            const res = await fetch('/api/image/history');
            if (res.status === 401) {
                sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                window.location.href = '/login.html';
                return;
            }
            const data = await res.json();
            const list = document.getElementById('historyList');
            
            if (!data || data.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 mt-10 text-sm">空空如也，快去创作第一幅作品吧！</div>';
                return;
            }
            
            list.innerHTML = data.map(item => {
                const date = new Date(item.createTime).toLocaleString([], {month: 'short', day: '2-digit', hour: '2-digit', minute:'2-digit'});
                
                // 解析 prompt 以便展示 (可能是纯文本，也可能是复杂的 JSON string)
                let displayPrompt = "多模态请求";
                try {
                    const reqObj = JSON.parse(item.userPrompt);
                    if (reqObj.input && reqObj.input.prompt) {
                        displayPrompt = reqObj.input.prompt;
                    } else if (reqObj.input && reqObj.input.messages) {
                        // 尝试从 messages 中提取文字
                        const contents = reqObj.input.messages[0].content;
                        if (Array.isArray(contents)) {
                            const textItem = contents.find(c => c.text);
                            if (textItem) displayPrompt = textItem.text;
                        }
                    }
                } catch(e) { displayPrompt = item.userPrompt; }
                
                // 图片展示
                let imgHtml = '';
                if (item.imageUrls) {
                    const urls = item.imageUrls.split(',');
                    imgHtml = `
                    <div class="relative mt-2 group/img flex justify-center bg-slate-900 rounded-lg overflow-hidden border border-slate-600 group-hover:border-indigo-500 transition-colors">
                        <img src="${urls[0]}" class="max-w-full max-h-48 object-contain cursor-pointer" loading="lazy" onclick="window.open('${urls[0]}', '_blank')" >
                    </div>`;
                } else {
                    imgHtml = `<div class="w-full h-32 bg-slate-800 rounded-lg mt-2 flex items-center justify-center text-xs text-slate-500 border border-slate-700">处理中或无图片</div>`;
                }

                return `
                    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 hover:border-indigo-500 transition-all group">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs text-slate-400">${date}</span>
                            <span class="text-[10px] bg-slate-700 text-slate-300 px-2 py-0.5 rounded">${item.aiModel}</span>
                        </div>
                        <p class="text-sm text-slate-200 line-clamp-2" title="${displayPrompt.replace(/"/g, '&quot;')}">${displayPrompt}</p>
                        ${imgHtml}
                    </div>
                `;
            }).join('');
        } catch (e) {
            console.error('加载画廊失败', e);
        }
    }

    // 初始化
    async function ensureLogin() {
        try {
            const res = await fetch('/api/auth/me');
            const data = await res.json();
            if (!data || !data.success) {
                sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                window.location.href = '/login.html';
                return false;
            }
            return true;
        } catch (e) {
            sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
            window.location.href = '/login.html';
            return false;
        }
    }

    window.addEventListener('DOMContentLoaded', async () => {
        const ok = await ensureLogin();
        if (ok) loadHistory();
    });
</script>
</body>
</html>
