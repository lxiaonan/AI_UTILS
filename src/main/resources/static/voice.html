<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 语音合成工作台</title>
    <link rel="icon" type="image/png" href="/logo/ai%E5%9B%BE%E6%A0%87.png">
    <link rel="apple-touch-icon" href="/logo/ai%E5%9B%BE%E6%A0%87.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at 50% 20%, #1e1b4b 0%, #05060a 55%, #000 100%); color: #e2e8f0; min-height: 100vh; }
        .glass-nav { background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(148, 163, 184, 0.12); }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); transition: all 0.3s ease; }
        .glass-panel:hover { border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4); }
        .gradient-text { background: linear-gradient(to right, #818cf8, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-border { transition: all 0.3s ease; }
        .neon-border:focus-within { box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); border-color: #6366f1; transform: scale(1.01); }
        .btn-glow { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.6); transform: translateY(-2px) scale(1.02); }
        .btn-glow:active { transform: translateY(1px) scale(0.98); }

        /* 音频波形动画模拟 */
        .wave-bar {
            width: 4px;
            background-color: #818cf8;
            animation: wave 1.2s ease-in-out infinite;
            display: inline-block;
            margin: 0 2px;
            border-radius: 2px;
        }
        .wave-bar:nth-child(2) { animation-delay: -1.0s; }
        .wave-bar:nth-child(3) { animation-delay: -0.8s; }
        .wave-bar:nth-child(4) { animation-delay: -0.6s; }
        .wave-bar:nth-child(5) { animation-delay: -0.4s; }
        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }
    </style>
</head>
<body class="font-sans flex flex-col">

<nav class="glass-nav sticky top-0 z-50 mb-6">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex h-16 items-center justify-between">
            <div class="flex items-center gap-6 h-full">
                <a href="/" class="flex items-center" title="AI Platform">
                    <img src="/logo/ai%E5%9B%BE%E6%A0%87.png" class="w-9 h-9 rounded-2xl shadow-[0_0_24px_rgba(99,102,241,0.55)] ring-1 ring-indigo-400/30" alt="AI">
                </a>
                <a href="/" class="text-slate-400 hover:text-indigo-400 font-medium transition">SQL 优化</a>
                <a href="/history.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">优化历史</a>
                <a href="/image.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">图像生成</a>
                <a href="/3d-camera.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">3D 镜头控图</a>
                <a href="/voice.html" class="text-indigo-400 font-bold border-b-2 border-indigo-500 h-full flex items-center transition">语音生成</a>
            </div>

            <div id="userArea" class="flex items-center gap-3 text-sm">
                <a id="loginLink" href="/login.html" class="hidden text-slate-400 hover:text-indigo-400 font-medium transition">登录</a>
                <a id="registerLink" href="/register.html" class="hidden text-slate-400 hover:text-indigo-400 font-medium transition">注册</a>
                <div id="userInfo" class="hidden items-center gap-3">
                    <div class="text-slate-300">
                        <span class="font-bold text-slate-200" id="navUsername"></span>
                        <span class="text-slate-500 ml-2">AI 次数</span>
                        <span class="font-bold text-indigo-400" id="navUseCount"></span>
                    </div>
                    <button id="logoutBtn" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition border border-slate-700">退出</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 pb-12 flex-grow w-full">
    <div class="mb-10 text-center">
        <h2 class="text-5xl font-extrabold gradient-text tracking-tight mb-4">🎙️ 智能声音工坊</h2>
        <p class="text-slate-400 text-lg font-medium tracking-wide">赋予文字灵魂，一秒生成自然人声</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- 左侧/上方：生成控制台 -->
        <div class="lg:col-span-2 glass-panel rounded-3xl p-8 h-fit border border-slate-700/50">
            <div class="flex justify-between items-center mb-6">
                <label class="text-xl font-bold text-slate-200 flex items-center">
                    <span class="bg-indigo-900/40 text-indigo-400 p-2 rounded-lg mr-3 border border-indigo-500/30">✍️</span> 输入台词
                </label>
                <span class="text-xs bg-slate-800 text-slate-400 px-3 py-1.5 rounded-full border border-slate-700 font-mono">Model: qwen3-tts-flash</span>
            </div>
            
            <textarea id="textInput" rows="6" class="w-full bg-slate-900/60 border border-slate-700 rounded-2xl p-5 text-slate-200 text-lg leading-relaxed resize-none transition-all placeholder-slate-600 outline-none neon-border" placeholder="请输入您想让 AI 朗读的内容，支持中英文混排..."></textarea>
            
            <button id="generateBtn" class="mt-6 w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-[0_0_20px_rgba(99,102,241,0.4)] btn-glow flex justify-center items-center text-lg">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                开始生成声音
            </button>
            
            <!-- 生成结果区 -->
            <div id="resultArea" class="mt-8 hidden flex flex-col items-center bg-slate-900/40 p-6 rounded-2xl border border-slate-700/50">
                <div id="loadingAnim" class="flex items-end h-10 mb-4">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <span class="ml-4 text-indigo-400 font-bold animate-pulse">AI 正在努力发声中...</span>
                </div>
                
                <div id="audioContainer" class="w-full flex justify-center mt-2 hidden"></div>
            </div>
        </div>

        <!-- 右侧：历史记录流 -->
        <div class="glass-panel rounded-3xl p-6 flex flex-col h-[600px] border border-slate-700/50 relative">
            <h3 class="text-xl font-bold text-slate-200 mb-6 flex items-center border-b border-slate-700/50 pb-4">
                <span class="bg-indigo-900/40 text-indigo-400 p-2 rounded-lg mr-3 border border-indigo-500/30">🕒</span> 声音档案库
            </h3>
            
            <div id="historyList" class="flex-grow overflow-y-auto pr-2 space-y-4">
                <div class="text-center text-slate-500 mt-10">
                    <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    加载档案中...
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 加载历史记录
    async function loadHistory() {
        try {
            const res = await fetch('/api/voice/history');
            if (res.status === 401) {
                sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                window.location.href = '/login.html';
                return;
            }
            const data = await res.json();
            const list = document.getElementById('historyList');
            
            if (!data || data.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-500 mt-10 text-sm">暂无生成记录，快去试试吧！</div>';
                return;
            }
            
            list.innerHTML = data.map(item => {
                const date = new Date(item.createTime).toLocaleString([], {month: 'short', day: '2-digit', hour: '2-digit', minute:'2-digit'});
                return `
                    <div class="bg-slate-800/50 p-5 rounded-2xl shadow-sm border border-slate-700 hover:border-indigo-500/50 transition-colors group">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-xs text-slate-400 flex items-center"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>${date}</span>
                        </div>
                        <p class="text-sm text-slate-300 font-medium mb-4 line-clamp-2" title="${item.userText.replace(/"/g, '&quot;')}">"${item.userText}"</p>
                        ${item.audioUrl ? 
                            `<audio controls src="${item.audioUrl}" class="w-full h-10 outline-none opacity-80 group-hover:opacity-100 transition-opacity rounded-lg"></audio>` : 
                            `<span class="text-xs text-rose-400 bg-rose-900/30 px-3 py-1.5 rounded-lg border border-rose-800/50">音频链接已失效或生成失败</span>`
                        }
                    </div>
                `;
            }).join('');
        } catch (e) {
            console.error('加载历史记录失败', e);
        }
    }

    // 页面加载完成后获取历史
    async function ensureLogin() {
        try {
            const res = await fetch('/api/auth/me');
            const data = await res.json();
            if (!data || !data.success) {
                sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                window.location.href = '/login.html';
                return false;
            }
            return true;
        } catch (e) {
            sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
            window.location.href = '/login.html';
            return false;
        }
    }

    window.addEventListener('DOMContentLoaded', async () => {
        const ok = await ensureLogin();
        if (ok) loadHistory();
    });

    // 触发生成
    document.getElementById('generateBtn').addEventListener('click', async () => {
        const text = document.getElementById('textInput').value.trim();
        if (!text) {
            alert('您还没有输入要转换的文字哦！');
            return;
        }
        
        const btn = document.getElementById('generateBtn');
        const resultArea = document.getElementById('resultArea');
        const loadingAnim = document.getElementById('loadingAnim');
        const audioContainer = document.getElementById('audioContainer');
        
        btn.disabled = true;
        btn.classList.add('opacity-70', 'cursor-not-allowed');
        
        resultArea.classList.remove('hidden');
        loadingAnim.classList.remove('hidden');
        audioContainer.classList.add('hidden');

        try {
            const res = await fetch('/api/voice/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            if (res.status === 401) {
                sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                window.location.href = '/login.html';
                return;
            }
            const data = await res.json();
            
            // 根据真实返回的 JSON 结构解析 audio_url
            // {"output": {"audio": {"url": "..."}}}
            let audioUrl = null;
            if (data.output && data.output.audio && data.output.audio.url) {
                audioUrl = data.output.audio.url;
            } else if (data.output && data.output.choices && data.output.choices[0].message.content) {
                // 兼容多模态返回的结构
                const contents = data.output.choices[0].message.content;
                if (Array.isArray(contents)) {
                    for (let item of contents) {
                        if (item.audio) { audioUrl = item.audio; break; }
                    }
                }
            }
            
            if (audioUrl) {
                audioContainer.innerHTML = `
                    <div class="w-full bg-white rounded-2xl p-2 shadow-[0_0_15px_rgba(59,130,246,0.3)] border border-blue-100 flex justify-center">
                        <audio controls src="${audioUrl}" class="w-full outline-none" autoplay></audio>
                    </div>`;
            } else {
                audioContainer.innerHTML = `<div class="bg-red-50 text-red-600 px-4 py-3 rounded-lg w-full text-center text-sm border border-red-200">未能从返回结果中提取到音频链接，请查看控制台日志。</div>`;
                console.error("API返回数据异常:", data);
            }
            
            // 刷新右侧历史记录
            loadHistory();

        } catch (err) {
            audioContainer.innerHTML = `<div class="bg-red-50 text-red-600 px-4 py-3 rounded-lg w-full text-center text-sm border border-red-200">请求失败: ${err.message}</div>`;
        } finally {
            btn.disabled = false;
            btn.classList.remove('opacity-70', 'cursor-not-allowed');
            loadingAnim.classList.add('hidden');
            audioContainer.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
