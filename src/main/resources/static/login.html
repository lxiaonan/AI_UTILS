<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI 平台</title>
    <link rel="icon" type="image/png" href="/logo/ai%E5%9B%BE%E6%A0%87.png">
    <link rel="apple-touch-icon" href="/logo/ai%E5%9B%BE%E6%A0%87.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at 50% 20%, #1e1b4b 0%, #05060a 55%, #000 100%); color: #e2e8f0; }
        .glass { background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(18px); border: 1px solid rgba(148, 163, 184, 0.12); }
        .glow { box-shadow: 0 0 50px rgba(99, 102, 241, 0.18); }
        .gradient-text { background: linear-gradient(to right, #818cf8, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .neon-border { transition: all 0.3s ease; }
        .neon-border:focus-within { box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); border-color: #6366f1; transform: scale(1.01); }
        .btn-glow { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(99, 102, 241, 0.6); transform: translateY(-2px) scale(1.02); }
        .btn-glow:active { transform: translateY(1px) scale(0.98); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md glass glow rounded-3xl p-8">
        <div class="mb-6 text-center">
            <div class="flex justify-center mb-4">
                <img src="/logo/ai%E5%9B%BE%E6%A0%87.png" class="w-14 h-14 rounded-3xl shadow-[0_0_40px_rgba(99,102,241,0.5)] ring-1 ring-indigo-400/40" alt="AI">
            </div>
            <div class="text-3xl font-extrabold gradient-text">AI Platform</div>
            <div class="text-sm text-slate-400 mt-2">登录后使用 SQL 优化 / 生图 / 语音 / 3D 镜头</div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">用户名</label>
                <input id="username" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-3 outline-none neon-border" placeholder="请输入用户名" />
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">密码</label>
                <input id="password" type="password" class="w-full bg-slate-900/70 border border-slate-700 rounded-xl px-4 py-3 outline-none neon-border" placeholder="请输入密码" />
            </div>
            <button id="loginBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-3 rounded-xl transition-all btn-glow">
                登录
            </button>
            <div id="errorBox" class="hidden text-sm text-rose-300 bg-rose-900/30 border border-rose-800 rounded-xl p-3"></div>
        </div>

        <div class="mt-6 flex items-center justify-between text-sm text-slate-400">
            <a href="/" class="hover:text-indigo-300 transition">返回首页</a>
            <a href="/register.html" class="hover:text-indigo-300 transition">没有账号？去注册</a>
        </div>
    </div>

    <script>
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            errorBox.classList.add('hidden');
            errorBox.innerText = '';

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.classList.add('opacity-60', 'cursor-not-allowed');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!data.success) {
                    errorBox.innerText = data.message || '登录失败';
                    errorBox.classList.remove('hidden');
                    return;
                }
                const redirect = sessionStorage.getItem('redirectAfterLogin') || '/';
                sessionStorage.removeItem('redirectAfterLogin');
                window.location.href = redirect;
            } catch (e) {
                errorBox.innerText = '请求失败：' + e.message;
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-60', 'cursor-not-allowed');
            }
        }

        document.getElementById('loginBtn').addEventListener('click', doLogin);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        fetch('/api/auth/me').then(r => r.json()).then(d => {
            if (d && d.success) {
                window.location.href = '/';
            }
        }).catch(() => {});
    </script>
</body>
</html>
