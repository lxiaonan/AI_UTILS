<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SQL 优化历史</title>
    <link rel="icon" type="image/png" href="/logo/ai%E5%9B%BE%E6%A0%87.png">
    <link rel="apple-touch-icon" href="/logo/ai%E5%9B%BE%E6%A0%87.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at 50% 20%, #1e1b4b 0%, #05060a 55%, #000 100%); color: #e2e8f0; min-height: 100vh; }
        .glass-nav { background: rgba(15, 23, 42, 0.72); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(148, 163, 184, 0.12); }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.15); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); transition: all 0.3s ease; }
        .glass-panel:hover { border-color: rgba(99, 102, 241, 0.3); box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4); }
        .gradient-text { background: linear-gradient(to right, #818cf8, #c084fc, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="font-sans flex flex-col">

<nav class="glass-nav sticky top-0 z-50 mb-6">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex h-16 items-center justify-between">
            <div class="flex items-center gap-6 h-full">
                <a href="/" class="flex items-center" title="AI Platform">
                    <img src="/logo/ai%E5%9B%BE%E6%A0%87.png" class="w-9 h-9 rounded-2xl shadow-[0_0_24px_rgba(99,102,241,0.55)] ring-1 ring-indigo-400/30" alt="AI">
                </a>
                <a href="/" class="text-slate-400 hover:text-indigo-400 font-medium transition">SQL 优化</a>
                <a href="/history.html" class="text-indigo-400 font-bold border-b-2 border-indigo-500 h-full flex items-center transition">优化历史</a>
                <a href="/image.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">图像生成</a>
                <a href="/3d-camera.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">3D 镜头控图</a>
                <a href="/voice.html" class="text-slate-400 hover:text-indigo-400 font-medium transition">语音生成</a>
            </div>

            <div id="userArea" class="flex items-center gap-3 text-sm">
                <a id="loginLink" href="/login.html" class="hidden text-slate-400 hover:text-indigo-400 font-medium transition">登录</a>
                <a id="registerLink" href="/register.html" class="hidden text-slate-400 hover:text-indigo-400 font-medium transition">注册</a>
                <div id="userInfo" class="hidden items-center gap-3">
                    <div class="text-slate-300">
                        <span class="font-bold text-slate-200" id="navUsername"></span>
                        <span class="text-slate-500 ml-2">AI 次数</span>
                        <span class="font-bold text-indigo-400" id="navUseCount"></span>
                    </div>
                    <button id="logoutBtn" class="px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition border border-slate-700">退出</button>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 pb-10 flex-grow w-full">
    <h2 class="text-3xl font-extrabold mb-8 flex items-center text-slate-200"><span class="mr-3">📜</span> 历史优化记录</h2>
    <div class="glass-panel rounded-3xl overflow-hidden relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-3xl blur opacity-10 group-hover:opacity-20 transition duration-1000"></div>
        <div class="relative overflow-x-auto bg-slate-900/60">
            <table class="min-w-full divide-y divide-slate-700/50">
                <thead class="bg-slate-800/80">
                    <tr>
                        <th class="px-6 py-5 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">时间</th>
                        <th class="px-6 py-5 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">数据库</th>
                        <th class="px-6 py-5 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">模型</th>
                        <th class="px-6 py-5 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">评分</th>
                        <th class="px-6 py-5 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">用户 SQL</th>
                    </tr>
                </thead>
                <tbody id="historyList" class="divide-y divide-slate-800/50">
                    <!-- 数据加载中 -->
                    <tr><td colspan="5" class="px-6 py-12 text-center text-slate-500">正在加载数据...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    fetch('/api/sql/history')
        .then(res => {
            if (res.status === 401) {
                sessionStorage.setItem('redirectAfterLogin', window.location.pathname);
                window.location.href = '/login.html';
                return null;
            }
            return res.json();
        })
        .then(data => {
            if (!data) return;
            const list = document.getElementById('historyList');
            if (!data || data.length === 0) {
                list.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-slate-500">暂无优化记录，快去首页试一试吧！</td></tr>';
                return;
            }
            list.innerHTML = data.map(item => {
                const date = new Date(item.createTime).toLocaleString();
                const scoreColor = item.score >= 80 ? 'text-emerald-400' : (item.score >= 60 ? 'text-yellow-400' : 'text-rose-400');
                const sqlSnippet = item.userSql ? item.userSql.substring(0, 60) + (item.userSql.length > 60 ? '...' : '') : '--';
                
                return `
                    <tr class="hover:bg-slate-800/80 transition duration-300 cursor-pointer group hover:shadow-[inset_0_0_15px_rgba(99,102,241,0.15)]" onclick="window.location.href='/sql-detail.html?id=${item.id}'">
                        <td class="px-6 py-5 whitespace-nowrap text-sm text-slate-400 group-hover:text-slate-300">${date}</td>
                        <td class="px-6 py-5 whitespace-nowrap text-sm font-medium">
                            <span class="bg-indigo-900/40 text-indigo-300 px-3 py-1.5 rounded-lg border border-indigo-500/30 group-hover:border-indigo-400/50 group-hover:shadow-[0_0_10px_rgba(99,102,241,0.2)] transition-all">${item.dbType || '--'}</span>
                        </td>
                        <td class="px-6 py-5 whitespace-nowrap text-sm text-slate-400 group-hover:text-indigo-300 transition-colors">${item.aiModel || '--'}</td>
                        <td class="px-6 py-5 whitespace-nowrap text-lg font-bold ${scoreColor} drop-shadow-md group-hover:scale-110 transition-transform origin-left">${item.score || '--'}</td>
                        <td class="px-6 py-5 text-sm text-slate-300 font-mono truncate max-w-md group-hover:text-slate-200" title="${item.userSql ? item.userSql.replace(/"/g, '&quot;') : ''}">
                            ${sqlSnippet}
                        </td>
                    </tr>
                `;
            }).join('');
        })
        .catch(err => {
            document.getElementById('historyList').innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-red-500">获取历史记录失败: ${err.message}</td></tr>`;
        });

    async function initAuthNav() {
        try {
            const res = await fetch('/api/auth/me');
            const data = await res.json();
            if (!data || !data.success) {
                document.getElementById('loginLink').classList.remove('hidden');
                document.getElementById('registerLink').classList.remove('hidden');
                return;
            }
            const userInfo = document.getElementById('userInfo');
            userInfo.classList.remove('hidden');
            userInfo.classList.add('flex');
            document.getElementById('navUsername').innerText = data.username;
            document.getElementById('navUseCount').innerText = data.aiUseCount ?? 0;
        } catch (e) {
            document.getElementById('loginLink').classList.remove('hidden');
            document.getElementById('registerLink').classList.remove('hidden');
        }
    }

    document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        try {
            await fetch('/api/auth/logout', { method: 'POST' });
        } finally {
            window.location.href = '/login.html';
        }
    });

    window.addEventListener('DOMContentLoaded', initAuthNav);
</script>
</body>
</html>
